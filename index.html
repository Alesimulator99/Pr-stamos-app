<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Préstamos</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;background:#ffffff;color:#1a1a1a;font-family:'Inter',sans-serif;overflow:hidden}
input,select,textarea{font-size:16px!important}
.app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;background:#ffffff}
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;background:#ffffff;border-bottom:1px solid #e8e8e8;flex-shrink:0}
.header-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:0.05em;color:#00c853;line-height:1}
.header-subtitle{font-size:10px;color:#999;letter-spacing:0.1em;text-transform:uppercase}
.header-btn{width:36px;height:36px;border-radius:50%;background:#f0f0f0;border:none;color:#666;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.header-btn:active{background:#e0e0e0}
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:80px}
.scroll-area::-webkit-scrollbar{display:none}
.stats-strip{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 14px 0}
.stat-box{background:#f8f8f8;border:1px solid #ebebeb;border-radius:12px;padding:12px 14px}
.stat-box.green{border-color:#00c85340}.stat-box.gold{border-color:#ffd60050}.stat-box.blue{border-color:#64b5f650}
.stat-lbl{font-size:10px;color:#888;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:0.03em;line-height:1}
.stat-val.green{color:#00c853}.stat-val.gold{color:#ffd600}.stat-val.blue{color:#64b5f6}
.stat-sub{font-size:10px;color:#aaa;margin-top:2px}
.section-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 14px 8px}
.section-title{font-size:11px;color:#888;font-weight:600;letter-spacing:0.1em;text-transform:uppercase}
.section-count{font-size:11px;color:#aaa}
.filter-strip{display:flex;gap:6px;padding:0 14px 10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.filter-strip::-webkit-scrollbar{display:none}
.ftab{flex-shrink:0;padding:5px 13px;border-radius:100px;border:1px solid #ddd;background:transparent;color:#888;font-size:12px;font-family:'Inter',sans-serif;cursor:pointer;white-space:nowrap}
.ftab.active{background:#00c853;border-color:#00c853;color:#000;font-weight:600}
.loan-card{margin:0 14px 10px;background:#ffffff;border:1px solid #e8e8e8;border-radius:14px;overflow:hidden;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.loan-card:active{background:#f8f8f8}
.loan-card-top{display:flex;align-items:center;padding:14px 14px 10px;gap:12px}
.loan-avatar{width:40px;height:40px;border-radius:50%;background:#efefef;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:600;color:#888;flex-shrink:0;overflow:hidden}
.loan-avatar img{width:100%;height:100%;object-fit:cover}
.loan-name{font-size:15px;font-weight:600;line-height:1.2;color:#1a1a1a}
.loan-meta{font-size:11px;color:#999;margin-top:2px}
.loan-badge{margin-left:auto;padding:4px 10px;border-radius:100px;font-size:11px;font-weight:500;flex-shrink:0}
.loan-card-nums{display:grid;grid-template-columns:1fr 1fr 1fr;padding:0 14px 12px;gap:4px}
.loan-num-lbl{font-size:9px;color:#aaa;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:2px}
.loan-num-val{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:0.02em}
.loan-card-actions{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid #f0f0f0}
.loan-action-btn{padding:11px 0;border:none;background:transparent;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.loan-action-btn:active{background:#f5f5f5}
.loan-action-btn.pago{color:#d4a000;border-right:1px solid #f0f0f0}
.loan-action-btn.detalle{color:#aaa}
.progress-bar-wrap{margin:0 14px 12px}
.progress-bar-track{height:4px;background:#eeeeee;border-radius:2px;overflow:hidden}
.progress-bar-fill{height:100%;background:#00c853;border-radius:2px}
.progress-lbl{font-size:10px;color:#aaa;margin-top:4px}
.empty{text-align:center;padding:52px 24px}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-msg{font-size:14px;color:#bbb}
.fab{position:fixed;bottom:80px;right:calc(50% - 215px + 20px);width:56px;height:56px;border-radius:50%;background:#00c853;border:none;color:#000;font-size:28px;cursor:pointer;box-shadow:0 4px 20px #00c85340;display:flex;align-items:center;justify-content:center;z-index:50}
@media(max-width:430px){.fab{right:20px}}
.fab:active{transform:scale(0.93)}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;display:flex;background:#ffffff;border-top:1px solid #e8e8e8;z-index:40}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 8px;border:none;background:transparent;color:#bbb;font-family:'Inter',sans-serif;font-size:10px;font-weight:500;cursor:pointer;gap:3px}
.nav-item.active{color:#00c853}
.nav-icon{font-size:20px;line-height:1}
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:flex;flex-direction:column;justify-content:flex-end}
.sheet{background:#ffffff;border-radius:20px 20px 0 0;border-top:1px solid #e8e8e8;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sheet::-webkit-scrollbar{display:none}
.sheet-handle{width:36px;height:4px;background:#dddddd;border-radius:2px;margin:12px auto 0}
.sheet-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 4px}
.sheet-title{font-size:18px;font-weight:600;color:#1a1a1a}
.sheet-close{width:30px;height:30px;border-radius:50%;background:#f0f0f0;border:none;color:#666;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sheet-body{padding:16px 20px 32px}
.field{margin-bottom:16px}
.field label{font-size:11px;color:#888;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:6px;display:block}
.field input,.field select,.field textarea{width:100%;background:#f8f8f8;border:1px solid #e8e8e8;color:#1a1a1a;border-radius:10px;padding:13px 14px;font-family:'Inter',sans-serif;-webkit-appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#00c853}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-full{width:100%;padding:15px;border-radius:12px;border:none;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-full:active{opacity:0.88}
.btn-green{background:#00c853;color:#000}
.btn-yellow{background:#ffd600;color:#000}
.btn-outline{background:transparent;color:#888;border:1px solid #ddd}
.btn-blue{background:#1565c0;color:#fff}
.btn-row{display:flex;gap:10px;margin-top:4px}
.btn-row .btn-full{margin-top:0}
.alert{padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:14px}
.alert-error{background:#fff0f0;border:1px solid #ffcccc;color:#cc3333}
.alert-success{background:#00c85318;border:1px solid #00c85340;color:#00c853}
.detail-hero{margin:0 20px 16px;background:#f8f8f8;border-radius:14px;padding:16px}
.detail-nums{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.detail-num-lbl{font-size:9px;color:#aaa;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:3px}
.detail-num-val{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.03em}
.detail-info-row{display:flex;justify-content:space-between;align-items:center;padding:11px 20px;border-bottom:1px solid #f0f0f0;font-size:13px}
.detail-info-lbl{color:#aaa;font-size:12px}
.pago-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #f0f0f0}
.pago-monto{font-family:'Bebas Neue',sans-serif;font-size:20px;color:#ffd600;letter-spacing:0.02em}
.pago-meta{font-size:11px;color:#aaa;margin-top:1px}
.client-card{margin:0 14px 10px;background:#ffffff;border:1px solid #e8e8e8;border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.client-name{font-size:15px;font-weight:600;color:#1a1a1a}
.client-contact{font-size:12px;color:#aaa;margin-top:2px}
.icon-btn{width:34px;height:34px;border-radius:8px;border:1px solid #e8e8e8;background:transparent;color:#888;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.icon-btn.red{color:#ff5252;border-color:#ff525240}
.icon-btn:active{background:#f0f0f0}
.search-wrap{padding:10px 14px 6px;position:relative}
.search-input{width:100%;background:#f8f8f8;border:1px solid #ebebeb;color:#e8e8e4;border-radius:12px;padding:11px 14px 11px 38px;font-family:'Inter',sans-serif;font-size:14px!important;-webkit-appearance:none}
.search-icon{position:absolute;left:26px;top:50%;transform:translateY(-50%);color:#bbb;font-size:14px;pointer-events:none}
.loading{text-align:center;padding:48px;color:#bbb;font-size:13px}
/* foto ID */
.foto-zona{border:2px dashed #ddd;border-radius:12px;padding:20px;text-align:center;cursor:pointer;margin-bottom:16px;transition:border-color 0.15s}
.foto-zona:active{border-color:#00c853}
.foto-preview{width:100%;max-height:200px;object-fit:cover;border-radius:10px;margin-bottom:8px}
/* gráfica barras */
.chart-bar-wrap{padding:0 14px 14px}
.chart-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.chart-bar-label{font-size:11px;color:#555;width:36px;flex-shrink:0;text-align:right}
.chart-bar-track{flex:1;height:22px;background:#f0f0f0;border-radius:6px;overflow:hidden;position:relative}
.chart-bar-cap{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:600;white-space:nowrap;min-width:4px;color:#1a1a1a}
.chart-bar-int{position:absolute;top:0;height:100%;border-radius:0 6px 6px 0;opacity:0.6}
/* mes card */
.mes-card{margin:0 14px 10px;background:#ffffff;border:1px solid #e8e8e8;border-radius:12px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.mes-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.03em;margin-bottom:8px}
.mes-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid #f0f0f0}
.mes-row:last-child{border-bottom:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const SUPABASE_URL      = "https://wioqjplmozcwakjgrcoh.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indpb3FqcGxtb3pjd2FramdyY29oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NzA3NTMsImV4cCI6MjA5NzE0Njc1M30.EYuTJzS4HCB3zT-yGbSgMZpZCNcmfiQuV8c86zLRj8U";
const STORAGE_URL       = `${SUPABASE_URL}/storage/v1/object/public/clientes-id/`;

const H = { "Content-Type":"application/json", apikey:SUPABASE_ANON_KEY, Authorization:`Bearer ${SUPABASE_ANON_KEY}`, Prefer:"return=representation" };

const api = async (path, opts={}) => {
  const res = await fetch(SUPABASE_URL+"/rest/v1"+path, { headers:{...H,...(opts.headers||{})}, ...opts });
  if(!res.ok){ const e=await res.text(); throw new Error(e); }
  const t=await res.text(); return t?JSON.parse(t):[];
};

// Subir imagen a Supabase Storage
const uploadFoto = async (file, clienteId) => {
  const ext  = file.name.split(".").pop();
  const path = `${clienteId}.${ext}`;
  const res  = await fetch(`${SUPABASE_URL}/storage/v1/object/clientes-id/${path}`, {
    method:"POST",
    headers:{ apikey:SUPABASE_ANON_KEY, Authorization:`Bearer ${SUPABASE_ANON_KEY}`, "Content-Type":file.type, "x-upsert":"true" },
    body: file,
  });
  if(!res.ok) throw new Error("Error subiendo foto");
  return STORAGE_URL+path;
};

// ── HELPERS ────────────────────────────────────────────────────────────────
const fmt  = n => new Intl.NumberFormat("es-MX",{style:"currency",currency:"USD",minimumFractionDigits:2}).format(n||0);
const fmtS = n => { const v=parseFloat(n||0); return v>=1000?"$"+(v/1000).toFixed(1)+"k":"$"+v.toFixed(0); };
const fmtD = d => d?new Date(d+"T00:00:00").toLocaleDateString("es-MX",{day:"2-digit",month:"short",year:"2-digit"}):"—";
const fmtMes = d => { if(!d) return "—"; const dt=new Date(d); return dt.toLocaleDateString("es-MX",{month:"long",year:"numeric"}); };
const dias = f => f?Math.floor((new Date()-new Date(f+"T00:00:00"))/86400000):0;
const calcInt = (m,t,tp,f) => { const d=dias(f); const p=tp==="mensual"?d/30.44:tp==="semanal"?d/7:d/365.25; return Math.round(m*(t/100)*p*100)/100; };
const EC = {activo:"#00c853",pagado:"#64b5f6",vencido:"#ff5252",refinanciado:"#ffd600"};
const EB = {activo:"#00c85318",pagado:"#64b5f618",vencido:"#ff525218",refinanciado:"#ffd60018"};

// ── PDF EXPORT ─────────────────────────────────────────────────────────────
const exportarPDF = async (cliente, prestamos, pagosMap) => {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:"mm", format:"a4" });
  const W=210, ML=18, MR=192; let y=0;

  // Colores
  const VERDE=[0,168,68], GRIS_OSCURO=[40,40,40], GRIS_MED=[110,110,110],
        GRIS_LIGHT=[180,180,180], GRIS_BG=[248,248,248], LINEA=[230,230,230],
        BLANCO=[255,255,255], VERDE_BG=[240,252,245], VERDE_BORDER=[0,168,68];

  const setC  = (rgb) => doc.setTextColor(...rgb);
  const setF  = (rgb) => doc.setFillColor(...rgb);
  const setD  = (rgb) => doc.setDrawColor(...rgb);
  const bold  = (sz)  => { doc.setFont("helvetica","bold");   doc.setFontSize(sz); };
  const normal= (sz)  => { doc.setFont("helvetica","normal"); doc.setFontSize(sz); };
  const addPage = () => {
    doc.addPage();
    // línea verde top en página nueva
    setF(VERDE); doc.rect(0,0,W,1.2,"F");
    y=14;
  };

  // ── HEADER LIMPIO ─────────────────────────────────────────────────────────
  // Franja verde top
  setF(VERDE); doc.rect(0,0,W,1.5,"F");

  // Logo / título alineado izquierda
  bold(20); setC(GRIS_OSCURO);
  doc.text("PRÉSTAMOS", ML, 16);
  bold(20); setC(VERDE);
  doc.text("", ML+47, 16);

  // Línea separadora
  normal(8); setC(GRIS_LIGHT);
  doc.text("REPORTE DE CLIENTE", ML, 22);
  const fecha = new Date().toLocaleDateString("es-MX",{day:"2-digit",month:"long",year:"numeric"});
  doc.text(fecha, MR, 22, {align:"right"});

  setD(LINEA); doc.line(ML,25,MR,25);
  y = 32;

  // ── SECCIÓN CLIENTE ───────────────────────────────────────────────────────
  // Foto ID — esquina derecha, cuadrada, sin recorte
  let fotoAncho=0;
  if(cliente.foto_id){
    try{
      const img=new Image(); img.crossOrigin="anonymous";
      await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;img.src=cliente.foto_id;});
      const iW=55, iH=42;
      const canvas=document.createElement("canvas");
      canvas.width=img.width; canvas.height=img.height;
      canvas.getContext("2d").drawImage(img,0,0);
      setD([210,210,210]); doc.rect(MR-iW-0.5, y-0.5, iW+1, iH+1, "D");
      doc.addImage(canvas.toDataURL("image/jpeg"), MR-iW, y, iW, iH);
      fotoAncho=iW+6;
    } catch(e){}
  }

  // Nombre grande
  bold(16); setC(GRIS_OSCURO);
  doc.text(cliente.nombre||"—", ML, y+8);

  // Chip de estado total (calculamos después — solo un separador aquí)
  y+=13;
  normal(9); setC(GRIS_MED);
  const contactos=[];
  if(cliente.telefono) contactos.push("Tel: "+cliente.telefono);
  if(cliente.correo)   contactos.push(cliente.correo);
  if(cliente.direccion)contactos.push(cliente.direccion);
  if(contactos.length){
    doc.text(contactos.join("   |   "), ML, y);
    y+=7;
  }

  // ── TARJETAS RESUMEN (3 chips horizontales) ───────────────────────────────
  y+=3;
  const totalCap  = prestamos.reduce((s,p)=>s+parseFloat(p.monto_principal||0),0);
  const totalCob  = prestamos.reduce((s,p)=>s+parseFloat(p.total_pagado||0),0);
  const totalSaldo= prestamos.reduce((s,p)=>s+parseFloat(p.saldo_pendiente||0),0);
  const chips=[
    {lbl:"CAPITAL TOTAL",    val:fmt(totalCap),   color:GRIS_OSCURO},
    {lbl:"TOTAL COBRADO",    val:fmt(totalCob),   color:[0,130,55]},
    {lbl:"SALDO PENDIENTE",  val:fmt(totalSaldo), color:[180,120,0]},
  ];
  const chipW=(MR-ML-8)/3, chipH=18;
  chips.forEach((ch,i)=>{
    const cx=ML+i*(chipW+4);
    setF(GRIS_BG); setD(LINEA); doc.roundedRect(cx,y,chipW,chipH,2,2,"FD");
    bold(7); setC(GRIS_LIGHT); doc.text(ch.lbl, cx+chipW/2, y+5.5, {align:"center"});
    bold(10); setC(ch.color);  doc.text(ch.val, cx+chipW/2, y+13,  {align:"center"});
  });
  y+=chipH+10;

  // ── POR CADA PRÉSTAMO ─────────────────────────────────────────────────────
  for(let pi=0;pi<prestamos.length;pi++){
    const p=prestamos[pi];
    const int=calcInt(p.monto_principal,p.tasa_interes,p.tipo_interes,p.fecha_prestamo);
    const pgs=pagosMap[p.id]||[];
    const pct=p.monto_principal>0?Math.min(100,(p.total_pagado/p.monto_principal)*100):0;

    if(y>230) addPage();

    // ─ Cabecera del préstamo ─
    // Número de préstamo
    bold(7); setC(GRIS_LIGHT);
    doc.text(`PRÉSTAMO ${pi+1} DE ${prestamos.length}`, ML, y);

    // Badge de estado
    const estadoColors={activo:[0,168,68],pagado:[30,100,200],vencido:[200,50,50],refinanciado:[160,120,0]};
    const eC=estadoColors[p.estado]||GRIS_MED;
    const badgeW=22, badgeH=5.5;
    setF(eC); doc.roundedRect(MR-badgeW,y-4.5,badgeW,badgeH,1.5,1.5,"F");
    bold(6); setC(BLANCO); doc.text(p.estado.toUpperCase(), MR-badgeW/2, y-0.5, {align:"center"});
    y+=4;

    // Monto grande + línea accent
    setF(VERDE); doc.rect(ML,y,2.5,10,"F");
    bold(16); setC(GRIS_OSCURO);
    doc.text(fmt(p.monto_principal), ML+6, y+8);

    // Metadata en línea
    normal(8); setC(GRIS_MED);
    const meta=`${p.tasa_interes}% ${p.tipo_interes}   Inicio: ${fmtD(p.fecha_prestamo)}${p.fecha_vencimiento?"   Vence: "+fmtD(p.fecha_vencimiento):""}${p.plazo_meses?"   Plazo: "+p.plazo_meses+" meses":""}`;
    doc.text(meta, ML+6, y+14);
    y+=20;

    // ─ Fila de 3 valores clave ─
    const vals=[
      {lbl:"Interés acumulado", val:fmt(int),               color:[0,140,60]},
      {lbl:"Total pagado",      val:fmt(p.total_pagado),    color:[30,100,200]},
      {lbl:"Saldo pendiente",   val:fmt(p.saldo_pendiente), color:[160,100,0]},
    ];
    const vW=(MR-ML)/3;
    vals.forEach((v,i)=>{
      const vx=ML+i*vW;
      if(i>0){ setD(LINEA); doc.line(vx,y-1,vx,y+11); }
      normal(7); setC(GRIS_LIGHT); doc.text(v.lbl.toUpperCase(), vx+2, y+3);
      bold(10);  setC(v.color);    doc.text(v.val, vx+2, y+10);
    });
    y+=14;

    // ─ Barra de progreso ─
    const barW=MR-ML, barH=2.5;
    setF([235,235,235]); doc.roundedRect(ML,y,barW,barH,1,1,"F");
    if(pct>0){ setF(VERDE); doc.roundedRect(ML,y,barW*(pct/100),barH,1,1,"F"); }
    normal(7); setC(GRIS_LIGHT);
    doc.text(`${pct.toFixed(0)}% pagado`, MR, y+2, {align:"right"});
    y+=8;

    // ─ Tabla de pagos ─
    if(pgs.length>0){
      if(y>250) addPage();

      // Header tabla
      setF(GRIS_BG); doc.rect(ML,y,MR-ML,6.5,"F");
      setD(LINEA); doc.rect(ML,y,MR-ML,6.5,"D");
      bold(7); setC(GRIS_MED);
      doc.text("FECHA",   ML+3,  y+4.5);
      doc.text("MONTO",   ML+38, y+4.5);
      doc.text("TIPO",    ML+80, y+4.5);
      doc.text("NOTAS",   ML+108,y+4.5);
      y+=6.5;

      // Filas
      pgs.forEach((pg,ri)=>{
        if(y>272) addPage();
        if(ri%2===0){ setF([252,252,252]); doc.rect(ML,y,MR-ML,6.5,"F"); }
        setD(LINEA); doc.line(ML,y+6.5,MR,y+6.5);
        normal(8); setC(GRIS_OSCURO); doc.text(fmtD(pg.fecha_pago), ML+3, y+4.5);
        bold(8);   setC([0,140,60]);   doc.text(fmt(pg.monto),       ML+38,y+4.5);
        normal(8); setC(GRIS_MED);
        doc.text(pg.tipo_pago,                  ML+80, y+4.5);
        doc.text((pg.notas||"").substring(0,32),ML+108,y+4.5);
        y+=6.5;
      });
      y+=4;
    } else {
      normal(8); setC(GRIS_LIGHT); doc.text("Sin pagos registrados", ML, y); y+=8;
    }

    // Separador entre préstamos
    if(pi<prestamos.length-1){
      setD(LINEA); doc.line(ML,y+2,MR,y+2); y+=10;
    }
  }

  // ── FOOTER ────────────────────────────────────────────────────────────────
  const totalPgs=doc.internal.getNumberOfPages();
  for(let i=1;i<=totalPgs;i++){
    doc.setPage(i);
    setF(GRIS_BG); doc.rect(0,284,W,13,"F");
    setD(LINEA);   doc.line(0,284,W,284);
    normal(7); setC(GRIS_LIGHT);
    doc.text("PRÉSTAMOS  —  Confidencial", ML, 291);
    doc.text(`Generado el ${new Date().toLocaleString("es-MX")}`, W/2, 291, {align:"center"});
    doc.text(`Pág. ${i} / ${totalPgs}`, MR, 291, {align:"right"});
  }

  doc.save(`reporte_${(cliente.nombre||"cliente").replace(/\s+/g,"_")}_${new Date().toISOString().slice(0,10)}.pdf`);
};

// ── COMPONENTE FOTO ID ─────────────────────────────────────────────────────
function FotoID({value, onChange}){
  const inputRef = useRef();
  const [preview,setPreview] = useState(value||null);
  const [uploading,setUploading] = useState(false);

  const handleFile = async (file) => {
    if(!file) return;
    setUploading(true);
    const reader = new FileReader();
    reader.onload = e => setPreview(e.target.result);
    reader.readAsDataURL(file);
    onChange(file);
    setUploading(false);
  };

  return(
    <div className="field">
      <label>Foto / ID del cliente</label>
      <div className="foto-zona" onClick={()=>inputRef.current.click()}>
        {preview
          ? <img src={preview} className="foto-preview" alt="ID"/>
          : <div style={{color:"#bbb",fontSize:13}}>
              <div style={{fontSize:32,marginBottom:8}}>📷</div>
              <div>Toca para tomar foto o elegir imagen</div>
              <div style={{fontSize:11,color:"#ccc",marginTop:4}}>Cámara · Galería · Archivo</div>
            </div>
        }
        {uploading && <div style={{fontSize:12,color:"#00c853",marginTop:8}}>Subiendo…</div>}
      </div>
      <input ref={inputRef} type="file" accept="image/*" capture="environment"
        style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>
      {preview && (
        <button className="btn-full btn-outline" style={{fontSize:13,marginTop:-8}}
          onClick={()=>inputRef.current.click()}>📷 Cambiar foto</button>
      )}
    </div>
  );
}

// ── SHEET CLIENTE ──────────────────────────────────────────────────────────
function SheetCliente({cliente,onClose,onSaved}){
  const [f,setF]=useState(cliente||{nombre:"",telefono:"",correo:"",direccion:"",notas:"",foto_id:""});
  const [fotoFile,setFotoFile]=useState(null);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const s=(k,v)=>setF(p=>({...p,[k]:v}));

  const guardar=async()=>{
    if(!f.nombre.trim()) return setErr("El nombre es requerido.");
    setLoading(true); setErr("");
    try{
      let payload={...f};
      // Si hay foto nueva, primero guardamos el cliente para obtener su ID
      if(cliente?.id){
        if(fotoFile){ payload.foto_id = await uploadFoto(fotoFile,cliente.id); }
        await api(`/clientes?id=eq.${cliente.id}`,{method:"PATCH",body:JSON.stringify(payload)});
      } else {
        // Crear primero sin foto
        const [nuevo]=await api("/clientes",{method:"POST",body:JSON.stringify({...f,foto_id:""})});
        if(fotoFile){ const url=await uploadFoto(fotoFile,nuevo.id); await api(`/clientes?id=eq.${nuevo.id}`,{method:"PATCH",body:JSON.stringify({foto_id:url})}); }
      }
      onSaved();
    } catch(e){ setErr("Error al guardar: "+e.message); }
    finally{ setLoading(false); }
  };

  return(
    <Sheet onClose={onClose}>
      <div className="sheet-header">
        <span className="sheet-title">{cliente?.id?"Editar Cliente":"Nuevo Cliente"}</span>
        <button className="sheet-close" onClick={onClose}>✕</button>
      </div>
      <div className="sheet-body">
        {err&&<div className="alert alert-error">{err}</div>}
        <FotoID value={f.foto_id} onChange={file=>setFotoFile(file)}/>
        <div className="field"><label>Nombre *</label><input value={f.nombre} onChange={e=>s("nombre",e.target.value)} placeholder="Juan Pérez"/></div>
        <div className="grid-2">
          <div className="field"><label>Teléfono</label><input type="tel" value={f.telefono} onChange={e=>s("telefono",e.target.value)} placeholder="+1 000 000"/></div>
          <div className="field"><label>Correo</label><input type="email" value={f.correo} onChange={e=>s("correo",e.target.value)} placeholder="mail@mail.com"/></div>
        </div>
        <div className="field"><label>Dirección</label><input value={f.direccion} onChange={e=>s("direccion",e.target.value)}/></div>
        <div className="field"><label>Notas</label><textarea rows={2} value={f.notas} onChange={e=>s("notas",e.target.value)}/></div>
        <div className="btn-row">
          <button className="btn-full btn-outline" onClick={onClose}>Cancelar</button>
          <button className="btn-full btn-green" onClick={guardar} disabled={loading}>{loading?"Guardando…":"Guardar"}</button>
        </div>
      </div>
    </Sheet>
  );
}

      const d=new Date(f.fecha_prestamo+"T00:00:00");
      d.setMonth(d.getMonth()+parseInt(f.plazo_meses));

          <div className="field"><label>Interés % *</label><input type="number" inputMode="decimal" value={f.tasa_interes} onChange={e=>s("tasa_interes",e.target.value)} placeholder="5"/></div>

        <div className="field"><label>Tipo de interés</label>

// ── SHEET PAGO ─────────────────────────────────────────────────────────────
function SheetPago({prestamo,onClose,onSaved}){
  const today=new Date().toISOString().split("T")[0];
  const [f,setF]=useState({prestamo_id:prestamo.id,monto:"",tipo_pago:"mixto",fecha_pago:today,notas:""});
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const s=(k,v)=>setF(p=>({...p,[k]:v}));

  const guardar=async()=>{
    if(!f.monto||isNaN(f.monto)) return setErr("Monto inválido.");
    setLoading(true); setErr("");
    try{
      await api("/pagos",{method:"POST",body:JSON.stringify({...f,monto:parseFloat(f.monto)})});

      // ── Actualizar estado del préstamo automáticamente ──────────────────
      const nuevoTotalPagado = parseFloat(prestamo.total_pagado||0) + parseFloat(f.monto);
      const saldoRestante    = parseFloat(prestamo.monto_principal||0) - nuevoTotalPagado;
      const hoy              = new Date(); hoy.setHours(0,0,0,0);
      const vence            = prestamo.fecha_vencimiento ? new Date(prestamo.fecha_vencimiento+"T00:00:00") : null;

      let nuevoEstado = prestamo.estado; // mantener por defecto
      if(saldoRestante <= 0){
        nuevoEstado = "pagado";
      } else if(vence && hoy > vence){
        nuevoEstado = "vencido";
      } else {
        nuevoEstado = "activo";
      }

      if(nuevoEstado !== prestamo.estado){
        await api(`/prestamos?id=eq.${prestamo.id}`,{
          method:"PATCH",
          body:JSON.stringify({estado:nuevoEstado, updated_at:new Date().toISOString()})
        });
      }
      // ────────────────────────────────────────────────────────────────────

      onSaved();
    } catch(e){ setErr("Error al guardar."); }
    finally{ setLoading(false); }
  };

  const int=calcInt(prestamo.monto_principal,prestamo.tasa_interes,prestamo.tipo_interes,prestamo.fecha_prestamo);
  const mora=parseFloat(prestamo.mora_acumulada||0);
  const pct=prestamo.monto_principal>0?Math.min(100,(prestamo.total_pagado/prestamo.monto_principal)*100):0;

  return(
    <Sheet onClose={onClose}>
      <div className="sheet-header">
        <span className="sheet-title">Registrar Pago</span>
        <button className="sheet-close" onClick={onClose}>✕</button>
      </div>
      <div className="sheet-body">
        <div style={{background:"#f8f8f8",borderRadius:12,padding:14,marginBottom:16}}>
          <div style={{fontSize:14,fontWeight:600,marginBottom:8}}>{prestamo.cliente_nombre}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:10}}>
            <div><div className="detail-num-lbl">Capital</div><div className="detail-num-val">{fmtS(prestamo.monto_principal)}</div></div>
            <div><div className="detail-num-lbl">Interés hoy</div><div className="detail-num-val" style={{color:"#00c853"}}>{fmtS(int)}</div></div>
            <div><div className="detail-num-lbl">Pagado</div><div className="detail-num-val" style={{color:"#64b5f6"}}>{fmtS(prestamo.total_pagado)}</div></div>
            <div><div className="detail-num-lbl">Saldo+Mora</div><div className="detail-num-val" style={{color:parseFloat(prestamo.mora_acumulada||0)>0?"#ff5252":"#d4a000"}}>{fmtS(parseFloat(prestamo.saldo_pendiente||0)+parseFloat(prestamo.mora_acumulada||0))}</div></div>
          </div>
          <div className="progress-bar-track"><div className="progress-bar-fill" style={{width:pct+"%"}}/></div>
          <div className="progress-lbl">{pct.toFixed(0)}% pagado</div>
        </div>
        {err&&<div className="alert alert-error">{err}</div>}
        {mora>0&&<div style={{background:"#fff5f5",border:"1px solid #ffcccc",borderRadius:8,padding:"10px 12px",marginBottom:14,fontSize:12,color:"#cc3333"}}><strong>⚠️ Mora: {fmt(mora)}</strong> ({prestamo.dias_vencido} días vencido × ${parseFloat(prestamo.mora_diaria||0).toFixed(0)}/día)</div>}
        <div className="field"><label>Monto del pago *</label><input type="number" inputMode="decimal" value={f.monto} onChange={e=>s("monto",e.target.value)} placeholder="0.00" autoFocus/></div>
        <div className="grid-2">
          <div className="field"><label>Tipo</label>
            <select value={f.tipo_pago} onChange={e=>s("tipo_pago",e.target.value)}>
              <option value="mixto">Mixto</option>
              <option value="interes">Solo interés</option>
              <option value="capital">Solo capital</option>
            </select>
          </div>
          <div className="field"><label>Fecha</label><input type="date" value={f.fecha_pago} onChange={e=>s("fecha_pago",e.target.value)}/></div>
        </div>
        <div className="field"><label>Notas</label><input value={f.notas} onChange={e=>s("notas",e.target.value)} placeholder="Pago semanal…"/></div>
        <div className="btn-row">
          <button className="btn-full btn-outline" onClick={onClose}>Cancelar</button>
          <button className="btn-full btn-yellow" onClick={guardar} disabled={loading}>{loading?"Guardando…":"💰 Confirmar"}</button>
        </div>
      </div>
    </Sheet>
  );
}

         pagos.length===0?<div style={{fontSize:13,color:"#ccc",paddingBottom:12}}>Sin pagos registrados</div>:
         pagos.map(pg=>(
           <div key={pg.id} className="pago-item">
             <div><div className="pago-monto">{fmt(pg.monto)}</div><div className="pago-meta">{pg.notas||pg.tipo_pago}</div></div>
             <div style={{fontSize:12,color:"#999",textAlign:"right"}}>{fmtD(pg.fecha_pago)}</div>
           </div>
         ))
        }
      </div>
      <div style={{padding:"8px 20px 16px"}}>

        <button className="btn-full btn-blue" onClick={exportPDF} disabled={exportando}>
          {exportando?"Generando PDF…":"📄 Exportar Reporte PDF"}
        </button>
      </div>
    </Sheet>
  );
}

function VistaPrestamos({prestamos,clientes,loading,onPago,onDetalle,filtro,setFiltro,busqueda,setBusqueda}){

    const mE=filtro==="todos"||p.estado===filtro;
    const mB=p.cliente_nombre?.toLowerCase().includes(busqueda.toLowerCase());
    return mE&&mB;
  });
  const clienteMap={};
  clientes.forEach(c=>clienteMap[c.id]=c);

  return(
    <>
      <div className="search-wrap">
        <span className="search-icon">🔍</span>
        <input className="search-input" placeholder="Buscar cliente…" value={busqueda} onChange={e=>setBusqueda(e.target.value)}/>

      <div className="filter-strip">
        {["todos","activo","vencido","pagado","refinanciado"].map(e=>(

         const int=calcInt(p.monto_principal,p.tasa_interes,p.tipo_interes,p.fecha_prestamo);
         const pct=p.monto_principal>0?Math.min(100,(p.total_pagado/p.monto_principal)*100):0;
         const cli=clienteMap[p.cliente_id];
         return(
           <div key={p.id} className="loan-card" onClick={()=>onDetalle(p)}>

               <span className="loan-badge" style={{background:EB[p.estado],color:EC[p.estado]}}>{p.estado}</span>
             </div>
             <div className="loan-card-nums">
               <div><div className="loan-num-lbl">Capital</div><div className="loan-num-val">{fmtS(p.monto_principal)}</div></div>
               <div><div className="loan-num-lbl">Interés hoy</div><div className="loan-num-val" style={{color:"#00c853"}}>{fmtS(int)}</div></div>
               <div><div className="loan-num-lbl">Saldo</div><div className="loan-num-val" style={{color:parseFloat(p.mora_acumulada||0)>0?"#ff5252":"#d4a000"}}>{fmtS(parseFloat(p.saldo_pendiente||0)+parseFloat(p.mora_acumulada||0))}</div></div>
             </div>
             {parseFloat(p.mora_acumulada||0)>0&&(

// ── VISTA TASAS ────────────────────────────────────────────────────────────
function VistaTasas(){
  const [busqueda, setBusqueda] = useState("");

  const tramos = [
    {min:100,   max:500,   pct:20, clase:"t1", color:"#64b5f6"},
    {min:600,   max:1500,  pct:25, clase:"t2", color:"#00c853"},
    {min:1600,  max:4000,  pct:30, clase:"t3", color:"#ffd600"},
    {min:4100,  max:7000,  pct:35, clase:"t4", color:"#ff9800"},
    {min:7100,  max:10000, pct:40, clase:"t5", color:"#ff5252"},
  ];

  const montos = [];
  for(let i=100; i<=10000; i+=100) montos.push(i);

  const getTramo = m => tramos.find(t => m>=t.min && m<=t.max);
  const fmtD = n => "$"+n.toLocaleString("es-MX",{minimumFractionDigits:0,maximumFractionDigits:0});
  const fmtD2 = n => "$"+n.toLocaleString("es-MX",{minimumFractionDigits:2,maximumFractionDigits:2});

  const filtrados = busqueda ? montos.filter(m=>m.toString().includes(busqueda)) : montos;

  const totalCap = filtrados.reduce((s,m)=>s+m,0);
  const totalGan = filtrados.reduce((s,m)=>{ const t=getTramo(m); return s+m*(t.pct/100); },0);
  const totalMes = totalGan * 4;

  let tramoActual = null;
  const rows = [];
  filtrados.forEach(monto => {
    const t = getTramo(monto);
    const ganancia = monto*(t.pct/100);
    const total = monto+ganancia;
    const ganMes = ganancia*4;
    if(tramoActual !== t.clase){
      tramoActual = t.clase;
      rows.push(
        <div key={"sep-"+t.clase} className="int-separador">
          <span>{fmtD(t.min)} — {fmtD(t.max)}</span>
          <span style={{color:t.color}}>{t.pct}% de ganancia</span>
        </div>
      );
    }
    rows.push(
      <div key={monto} className={`int-row ${t.clase}`}>
        <div><div className="int-monto">{fmtD(monto)}</div></div>
        <div style={{textAlign:"right"}}>
          <span className="int-badge" style={{background:t.color+"22",color:t.color}}>{t.pct}%</span>
        </div>
        <div>
          <div className="int-val" style={{color:t.color}}>{fmtD2(ganancia)}</div>
          <div className="int-sub">x mes: {fmtD2(ganMes)}</div>
        </div>
        <div>
          <div className="int-val" style={{color:"#1a1a1a"}}>{fmtD2(total)}</div>
          <div className="int-sub">capital + interés</div>
        </div>
      </div>
    );
  });

  return(
    <>
      <div style={{padding:"16px 14px 8px"}}>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:"#00c853",letterSpacing:"0.04em"}}>Tabla de Tasas</div>
        <div style={{fontSize:11,color:"#aaa"}}>Escala progresiva · más monto, más ganancia</div>
      </div>

      {/* Chips de escala */}
      <div className="escala-strip-app">
        {[
          {rango:"$100–$500",   pct:"20%", color:"#64b5f6"},
          {rango:"$600–$1,500", pct:"25%", color:"#00c853"},
          {rango:"$1,600–$4k",  pct:"30%", color:"#ffd600"},
          {rango:"$4,100–$7k",  pct:"35%", color:"#ff9800"},
          {rango:"$7,100–$10k", pct:"40%", color:"#ff5252"},
        ].map(c=>(
          <div key={c.rango} className="escala-chip-app">
            <div className="escala-chip-rango">{c.rango}</div>
            <div className="escala-chip-pct" style={{color:c.color}}>{c.pct}</div>
          </div>
        ))}
      </div>

      {/* Resumen */}
      <div className="resumen-grid-app">
        <div className="resumen-box-app">
          <div className="resumen-box-lbl">Capital total</div>
          <div className="resumen-box-val">{fmtD(totalCap)}</div>
        </div>
        <div className="resumen-box-app">
          <div className="resumen-box-lbl">Ganancia x semana</div>
          <div className="resumen-box-val" style={{color:"#00c853"}}>{fmtD2(totalGan)}</div>
        </div>
        <div className="resumen-box-app">
          <div className="resumen-box-lbl">Total a cobrar</div>
          <div className="resumen-box-val" style={{color:"#d4a000"}}>{fmtD(totalCap+totalGan)}</div>
        </div>
        <div className="resumen-box-app">
          <div className="resumen-box-lbl">Ganancia x mes</div>
          <div className="resumen-box-val" style={{color:"#1565c0"}}>{fmtD2(totalMes)}</div>
        </div>
      </div>

      {/* Búsqueda */}
      <div className="search-wrap">
        <span className="search-icon">🔍</span>
        <input className="search-input" placeholder="Buscar monto…" value={busqueda} onChange={e=>setBusqueda(e.target.value)} type="number" inputMode="numeric"/>
      </div>

      {/* Tabla */}
      <div className="int-table-header">
        <div className="int-th" style={{textAlign:"left",color:"#fff"}}>Préstamo</div>
        <div className="int-th" style={{color:"#aaa"}}>Tasa</div>
        <div className="int-th" style={{color:"#00c85390"}}>Ganancia</div>
        <div className="int-th" style={{color:"#ffd60090"}}>Total cobrar</div>
      </div>
      {filtrados.length===0
        ? <div className="empty"><div className="empty-icon">🔍</div><div className="empty-msg">Sin resultados</div></div>
        : rows
      }
    </>
  );
}

// ── VISTA RESUMEN ──────────────────────────────────────────────────────────
function VistaResumen({prestamos}){
  const activos=prestamos.filter(p=>p.estado==="activo");
  const vencidos=prestamos.filter(p=>p.estado==="vencido");
  const totalCap=activos.reduce((s,p)=>s+parseFloat(p.monto_principal||0),0);
  const totalInt=activos.reduce((s,p)=>s+calcInt(p.monto_principal,p.tasa_interes,p.tipo_interes,p.fecha_prestamo),0);
  const totalSaldo=activos.reduce((s,p)=>s+parseFloat(p.saldo_pendiente||0),0);
  const totalCob=prestamos.reduce((s,p)=>s+parseFloat(p.total_pagado||0),0);

  return(
    <>
      <div style={{padding:"16px 14px 8px"}}>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:"#00c853",letterSpacing:"0.04em"}}>Resumen General</div>
        <div style={{fontSize:11,color:"#bbb"}}>Actualizado en tiempo real</div>
      </div>
      <div className="stats-strip">
        <div className="stat-box"><div className="stat-lbl">Capital activo</div><div className="stat-val">{fmt(totalCap)}</div><div className="stat-sub">{activos.length} préstamos activos</div></div>
        <div className="stat-box green"><div className="stat-lbl">Interés acumulado</div><div className="stat-val green">{fmt(totalInt)}</div><div className="stat-sub">Activos hoy</div></div>
        <div className="stat-box gold"><div className="stat-lbl">Por cobrar</div><div className="stat-val gold">{fmt(totalSaldo)}</div><div className="stat-sub">Saldo pendiente</div></div>
        <div className="stat-box blue"><div className="stat-lbl">Total cobrado</div><div className="stat-val blue">{fmt(totalCob)}</div><div className="stat-sub">Histórico</div></div>
      </div>
      {vencidos.length>0&&(
        <div style={{margin:"14px 14px 0",background:"#fff5f5",border:"1px solid #ffcccc",borderRadius:12,padding:"12px 14px"}}>
          <div style={{fontSize:12,color:"#ff5252",fontWeight:600,marginBottom:6}}>⚠️ {vencidos.length} préstamo{vencidos.length>1?"s":""} vencido{vencidos.length>1?"s":""}</div>
          {vencidos.map(p=>(
            <div key={p.id} style={{fontSize:12,color:"#aaa",paddingTop:4,borderTop:"1px solid #ffdddd",marginTop:4}}>
              {p.cliente_nombre} · {fmt(p.saldo_pendiente)} pendiente
            </div>
          ))}
        </div>
      )}
      <div style={{margin:"14px 14px 0"}}>
        <div style={{fontSize:11,color:"#bbb",fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10}}>Por estado</div>
        {[{e:"activo",l:"Activos"},{e:"vencido",l:"Vencidos"},{e:"pagado",l:"Pagados"},{e:"refinanciado",l:"Refinanciados"}].map(({e,l})=>{
          const count=prestamos.filter(p=>p.estado===e).length;
          const pct=prestamos.length>0?(count/prestamos.length)*100:0;
          return(
            <div key={e} style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:5}}>
                <span style={{color:EC[e]}}>{l}</span><span style={{color:"#999"}}>{count}</span>
              </div>
              <div className="progress-bar-track"><div className="progress-bar-fill" style={{width:pct+"%",background:EC[e]}}/></div>
            </div>
          );
        })}
      </div>
    </>
  );
}

  const [prestamoEditar,setPrestamoEditar]=useState(null);
  const [sheetPago,setSheetPago]=useState(null);
  const [sheetDetalle,setSheetDetalle]=useState(null);
  const [sheetCliente,setSheetCliente]=useState(false);
  const [clienteEditar,setClienteEditar]=useState(null);

  const cargar=useCallback(async()=>{
    setLoading(true);
    try{
      const [p,c]=await Promise.all([
        api("/prestamos_detalle?order=created_at.desc"),
        api("/clientes?order=nombre.asc"),
      ]);
      setPrestamos(p); setClientes(c);
    } catch(e){ console.error(e); }
    finally{ setLoading(false); }
  },[]);

  useEffect(()=>{ cargar(); },[cargar]);

  const eliminarCliente=async(id)=>{
    if(!confirm("¿Eliminar cliente y todos sus préstamos?")) return;
    await api(`/clientes?id=eq.${id}`,{method:"DELETE"});
    cargar();
  };

  const NAV=[
    {id:"prestamos",icon:"📋",label:"Préstamos"},
    {id:"resumen",icon:"📊",label:"Resumen"},
    {id:"reportes",icon:"📈",label:"Reportes"},
    {id:"tasas",icon:"💰",label:"Tasas"},
    {id:"clientes",icon:"👥",label:"Clientes"},
  ];

  return(
    <div className="app">
      <div className="header">
        <div>
          <div className="header-title">PRÉSTAMOS</div>
          <div className="header-subtitle">Control de préstamos</div>
        </div>
        <button className="header-btn" onClick={cargar}>↺</button>
      </div>

      <div className="scroll-area">
        {tab==="prestamos"&&<VistaPrestamos prestamos={prestamos} clientes={clientes} loading={loading} filtro={filtro} setFiltro={setFiltro} busqueda={busqueda} setBusqueda={setBusqueda} onPago={p=>setSheetPago(p)} onDetalle={p=>setSheetDetalle(p)}/>}
        {tab==="resumen"&&<VistaResumen prestamos={prestamos}/>}
        {tab==="reportes"&&<VistaReportes prestamos={prestamos} clientes={clientes}/>}
        {tab==="tasas"&&<VistaTasas/>}
        {tab==="clientes"&&<VistaClientes clientes={clientes} loading={loading} onEdit={c=>{setClienteEditar(c);setSheetCliente(true);}} onDelete={eliminarCliente}/>}
      </div>

      {(tab==="prestamos"||tab==="clientes")&&(
        <button className="fab" onClick={()=>{
          if(tab==="clientes"){setClienteEditar(null);setSheetCliente(true);}
          else{setPrestamoEditar(null);setSheetPrestamo(true);}
        }}>＋</button>
      )}

      <nav className="bottom-nav">
        {NAV.map(n=>(
          <button key={n.id} className={`nav-item ${tab===n.id?"active":""}`} onClick={()=>setTab(n.id)}>
            <span className="nav-icon">{n.icon}</span>{n.label}
          </button>
        ))}
      </nav>

      {sheetCliente&&<SheetCliente cliente={clienteEditar} onClose={()=>setSheetCliente(false)} onSaved={()=>{setSheetCliente(false);cargar();}}/>}
      {sheetPrestamo&&<SheetPrestamo prestamo={prestamoEditar} clientes={clientes} onClose={()=>setSheetPrestamo(false)} onSaved={()=>{setSheetPrestamo(false);cargar();}}/>}
      {sheetPago&&<SheetPago prestamo={sheetPago} onClose={()=>setSheetPago(null)} onSaved={()=>{setSheetPago(null);cargar();}}/>}
      {sheetDetalle&&<SheetDetalle prestamo={sheetDetalle} clientes={clientes} onClose={()=>setSheetDetalle(null)}
        onPago={()=>{const p=sheetDetalle;setSheetDetalle(null);setSheetPago(p);}}
        onEdit={()=>{const p=sheetDetalle;setSheetDetalle(null);setPrestamoEditar(p);setSheetPrestamo(true);}}
      />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
